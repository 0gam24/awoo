name: Sync today's issue (naver-news)

# 매일 06:00 KST (= 21:00 UTC 전일) 자동 실행
# + 수동 실행 가능
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

concurrency:
  group: sync-issues
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    name: Fetch news + auto-curate today's issue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # job-level env hoisting — step-level if 조건에서 env.* 평가 가능
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run sync script
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: npm run sync:issues

      - name: Verify content (lint)
        run: npm run lint:content

      # Cycle #9 Step 4 / Cycle #10 P0-1: 1일 1개 영구 포스트 자동 생성
      # ANTHROPIC_API_KEY 미등록 시 graceful skip — sync 실패로 이어지지 않음.
      # POSTS_PER_DAY=1 + 7일 primary subsidy dedup (Cycle #7) 적용.
      # NOTE: ANTHROPIC_API_KEY는 job-level env로 hoisting됨 → 조건이 정상 평가됨.
      - name: Generate permanent post
        id: generate
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        run: npm run generate:issues

      - name: Skip notice (no ANTHROPIC_API_KEY)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::warning title=영구 포스트 생성 스킵::ANTHROPIC_API_KEY 미등록 — sync만 진행"

      - name: Check for changes
        id: diff
        run: |
          # today-issue.json 또는 신규 영구 포스트(_history 포함) 변경 감지
          if [ -n "$(git status --porcelain src/data/today-issue.json src/data/issues/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data change — skipping commit"
          fi

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "awoo-bot"
          git config user.email "noreply@awoo.or.kr"
          git add src/data/today-issue.json src/data/issues/
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "chore(data): 오늘의 이슈 자동 갱신 — ${DATE}

          [skip ci]"
          git push origin main
